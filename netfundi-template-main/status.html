<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NETFUNDI - Connection Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #00ffae;
            --secondary-green: #2b9d5d;
            --accent-green: #4ade80;
            --dark-bg: #001d14;
            --darker-bg: #000f0a;
            --white: #ffffff;
            --light-gray: #f1f5f9;
            --medium-gray: #64748b;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #000f0a 0%, #001d14 50%, #012f1b 100%);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle background pattern */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(0, 255, 174, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 255, 174, 0.02) 0%, transparent 50%);
            pointer-events: none;
        }

        .status-container {
            position: relative;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 2rem;
            max-width: 480px;
            width: 90%;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.8s ease-out;
        }

        /* Enhanced Header with Logo */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(45deg, var(--primary-green), var(--accent-green));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .wifi-icon {
            width: 100%;
            height: 100%;
            color: var(--darker-bg);
            stroke-width: 2.5;
        }

        .brand-info {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-green);
            line-height: 1;
            letter-spacing: 0.5px;
        }

        .brand-tagline {
            font-size: 0.75rem;
            color: var(--medium-gray);
            font-weight: 300;
            margin-top: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .connection-indicator {
            width: 16px;
            height: 16px;
            background: var(--success);
            border-radius: 50%;
            position: relative;
            animation: pulse 2s infinite;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
        }

        .connection-indicator::after {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border: 2px solid var(--success);
            border-radius: 50%;
            opacity: 0.4;
            animation: ripple 2s infinite;
        }

        .connection-indicator::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 1px solid var(--success);
            border-radius: 50%;
            opacity: 0.2;
            animation: ripple 2s infinite 0.5s;
        }

        /* Status Section */
        .status-section {
            margin-bottom: 1.5rem;
        }

        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(45deg, var(--success), var(--accent-green));
            color: var(--white);
            font-weight: 600;
            padding: 0.4rem 0.8rem;
            border-radius: 50px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }

        .status-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--white);
        }

        /* Connection Details */
        .details-grid {
            display: grid;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-label {
            font-size: 0.9rem;
            color: var(--medium-gray);
            font-weight: 400;
        }

        .detail-value {
            font-weight: 600;
            color: var(--white);
        }

        .detail-value.highlight {
            color: var(--primary-green);
            font-family: 'Orbitron', sans-serif;
            font-weight: 500;
        }

        .detail-value.warning {
            color: var(--warning);
        }

        /* Progress Bar for Time Remaining */
        .time-progress {
            margin-top: 0.5rem;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--warning), var(--primary-green));
            width: 25%; /* Represents remaining time percentage */
            transition: width 0.3s ease;
        }

        /* Enhanced Footer */
        .footer {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--medium-gray);
        }

        .footer-icon {
            width: 20px;
            height: 20px;
            fill: var(--primary-green);
        }

        .footer-brand {
            font-weight: 600;
            color: var(--primary-green);
        }



        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { 
                transform: scale(1);
                opacity: 1;
            }
            50% { 
                transform: scale(1.3);
                opacity: 0.8;
            }
        }

        @keyframes ripple {
            0% {
                transform: scale(0.8);
                opacity: 0.6;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .status-container {
                padding: 2rem;
                margin: 1rem;
            }
            
            .logo-section {
                gap: 0.75rem;
            }
            
            .brand-name {
                font-size: 1.5rem;
            }
            
            .logo {
                width: 40px;
                height: 40px;
                font-size: 1rem;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="header">
            <div class="logo-section">
                <div class="logo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="wifi-icon">
                        <path d="M5 12.55a11 11 0 0 1 14.08 0" />
                        <path d="M1.42 9a16 16 0 0 1 21.16 0" />
                        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
                        <line x1="12" y1="20" x2="12.01" y2="20" />
                    </svg>
                </div>
                <div class="brand-info">
                    <div class="brand-name">NETFUNDI</div>
                    <div class="brand-tagline">Bei Poa, Speed Noma</div>
                </div>
            </div>
            <div class="connection-indicator"></div>
        </div>

        <div class="status-section">
            <div class="status-chip">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Connected & Active
            </div>
            <h1 class="status-title">Connection Details</h1>
        </div>

        <div class="details-grid">
            <div class="detail-item">
                <span class="detail-label">Voucher Code</span>
                <span class="detail-value highlight">YGQJDBL</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Session Expires</span>
                <span class="detail-value">2025-07-12 23:03:45</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Time Remaining</span>
                <div>
                    <span class="detail-value warning">0h 29m</span>
                    <div class="time-progress">
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="detail-item">
                <span class="detail-label">Connection Speed</span>
                <span class="detail-value">5 Mbps</span>
            </div>
        </div>

        <div class="footer">
            <div class="footer-main">
                <svg class="footer-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12,1L3,5V11C3,16.55 6.84,21.74 12,23C17.16,21.74 21,16.55 21,11V5L12,1M12,7C13.4,7 14.8,8.6 14.8,10.1V11.1C14.8,11.2 14.9,11.3 15,11.3H16.2C16.6,11.3 17,11.7 17,12.1V16.2C17,16.6 16.6,17 16.2,17H7.8C7.4,17 7,16.6 7,16.2V12.1C7,11.7 7.4,11.3 7.8,11.3H9C9.1,11.3 9.2,11.2 9.2,11.1V10.1C9.2,8.6 10.6,7 12,7M12,8.2C11.2,8.2 10.4,8.7 10.4,10.1V11.1H13.6V10.1C13.6,8.7 12.8,8.2 12,8.2Z" />
                </svg>
                <span>Powered by <span class="footer-brand">NOVA</span> Infrastructure</span>
            </div>
        </div>
    </div>
</body>
</html>
